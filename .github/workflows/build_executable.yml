name: Build Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build_standalone_executable:
    strategy:
      matrix:
        python-version: ["3.14"]
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Executable
        run: |
          pip install tox
          tox -e build_executable

      - name: Smoke Test
        run: python unittests/smoke_test_exe.py dist/sapwebgui_mcp_windows.exe

      - name: Upload Executable as Artifact
        uses: actions/upload-artifact@v6
        with:
          name: sapwebgui_mcp_windows
          path: dist/sapwebgui_mcp_windows.exe

      - name: Upload Executable to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sapwebgui_mcp_windows.exe
