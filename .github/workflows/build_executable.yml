name: Build Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build Executable
        run: |
          pip install tox
          tox -e build_executable

      - name: Freeze build dependencies
        run: tox exec -e build_executable -- pip freeze > dist/build-dependencies.txt

      - name: Upload Executable as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sapwebgui_mcp_windows
          path: |
            dist/sapwebgui_mcp_windows.exe
            dist/build-dependencies.txt

  smoke_test:
    needs: build
    runs-on: windows-latest
    strategy:
      matrix:
        chrome: [true, false]
    name: "Smoke Test (Chrome: ${{ matrix.chrome }})"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download Executable
        uses: actions/download-artifact@v8
        with:
          name: sapwebgui_mcp_windows
          path: dist

      # Chrome is pre-installed on GitHub Actions windows-latest runners
      - name: Start Chrome headless
        if: matrix.chrome
        run: |
          Start-Process -FilePath "C:\Program Files\Google\Chrome\Application\chrome.exe" `
            -ArgumentList "--headless", "--disable-gpu", "--remote-debugging-port=9222", "--user-data-dir=$env:TEMP\chrome-debug"
          Start-Sleep -Seconds 3
          Invoke-WebRequest -Uri "http://localhost:9222/json/version" -UseBasicParsing
        shell: pwsh

      - name: Smoke Test
        run: python unittests/webgui/smoke_test_exe.py dist/sapwebgui_mcp_windows.exe

  release:
    needs: [build, smoke_test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Executable
        uses: actions/download-artifact@v8
        with:
          name: sapwebgui_mcp_windows
          path: dist

      - name: Rename Executable with version
        run: mv ./dist/sapwebgui_mcp_windows.exe ./dist/sapwebgui_mcp_windows_${{ github.ref_name }}.exe

      - name: Upload Executable to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/sapwebgui_mcp_windows_${{ github.ref_name }}.exe
