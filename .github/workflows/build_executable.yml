name: Build Executable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build_public:
    runs-on: windows-latest
    name: "Build (public)"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build Executable
        env:
          SAPWEBGUI_BUILD_NAME: sapwebgui_mcp_windows
        run: |
          pip install tox
          tox -e build_executable

      - name: Freeze build dependencies
        run: tox exec -e build_executable -- pip freeze > dist/build-dependencies.txt

      - name: Upload Executable as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sapwebgui_mcp_windows
          path: |
            dist/sapwebgui_mcp_windows.exe
            dist/build-dependencies.txt

  build_hf:
    runs-on: windows-latest
    name: "Build (hf)"
    # Repository secrets are not available to PRs from forks, so skip this
    # variant in that case. Public forks can still build the public binary.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Write .env.production from secrets
        env:
          PAPERTRAIL_HOST: ${{ secrets.PAPERTRAIL_HOST }}
          PAPERTRAIL_PORT: ${{ secrets.PAPERTRAIL_PORT }}
        shell: pwsh
        run: |
          if (-not $env:PAPERTRAIL_HOST -or -not $env:PAPERTRAIL_PORT) {
            Write-Error "PAPERTRAIL_HOST and PAPERTRAIL_PORT secrets must be configured for the hf build."
            exit 1
          }
          @"
          PAPERTRAIL_HOST=$env:PAPERTRAIL_HOST
          PAPERTRAIL_PORT=$env:PAPERTRAIL_PORT
          "@ | Out-File -Encoding utf8 -NoNewline .env.production

      - name: Build Executable
        env:
          SAPWEBGUI_BUILD_NAME: sapwebgui_mcp_windows_hf
        run: |
          pip install tox
          tox -e build_executable

      - name: Freeze build dependencies
        run: tox exec -e build_executable -- pip freeze > dist/build-dependencies.txt

      - name: Upload Executable as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sapwebgui_mcp_windows_hf
          path: |
            dist/sapwebgui_mcp_windows_hf.exe
            dist/build-dependencies.txt

  smoke_test:
    needs: build_public
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        chrome: [true, false]
    name: "Smoke Test (Chrome: ${{ matrix.chrome }})"
    # The two variants share all non-logging code paths, so smoke-testing the
    # public binary is sufficient — HF-specific behaviour (Papertrail) cannot
    # be smoke-tested without a live Papertrail collector anyway.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download Executable
        uses: actions/download-artifact@v8
        with:
          name: sapwebgui_mcp_windows
          path: dist

      # Chrome is pre-installed on GitHub Actions windows-latest runners
      - name: Start Chrome headless
        if: matrix.chrome
        run: |
          Start-Process -FilePath "C:\Program Files\Google\Chrome\Application\chrome.exe" `
            -ArgumentList "--headless", "--disable-gpu", "--remote-debugging-port=9222", "--user-data-dir=$env:TEMP\chrome-debug"
          Start-Sleep -Seconds 3
          Invoke-WebRequest -Uri "http://localhost:9222/json/version" -UseBasicParsing
        shell: pwsh

      - name: Smoke Test
        run: python unittests/webgui/smoke_test_exe.py dist/sapwebgui_mcp_windows.exe

  release:
    needs: [build_public, build_hf, smoke_test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        binary_name:
          - sapwebgui_mcp_windows
          - sapwebgui_mcp_windows_hf
    steps:
      - name: Download Executable
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.binary_name }}
          path: dist

      - name: Rename Executable with version
        run: mv ./dist/${{ matrix.binary_name }}.exe ./dist/${{ matrix.binary_name }}_${{ github.ref_name }}.exe

      - name: Upload Executable to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./dist/${{ matrix.binary_name }}_${{ github.ref_name }}.exe
