[tox]
envlist =
    tests
    linting
    type_check
    spell_check
    formatting
skip_missing_interpreters = True
skipsdist = True

[testenv]
commands = python -m pip install --upgrade pip

[testenv:tests]
# Runs ALL tests. SAP integration tests are auto-skipped on non-SAP machines via pytest.skip().
# This allows CI to run all tests while only executing integration tests on authorized machines.
deps =
    -r requirements.txt
    .[tests]
setenv = PYTHONPATH = {toxinidir}/src
passenv =
    SAP_URL
    SAP_USER
    SAP_PASSWORD
    SAP_MANDANT
    SAP_LANGUAGE
commands = python -m pytest --basetemp={envtmpdir} {posargs}

[testenv:unit_tests]
# Runs all offline unit tests — no SAP connection needed.
# Includes: root-level model/config tests, desktop mock tests, WebGUI parser/unit tests.
#
# Default selection (no posargs): unittests/ filtered to "not integration and not exploration".
# Targeted run: ``tox -e unit_tests -- unittests/test_foo.py -v`` replaces the default
# entirely, so the -k filter does NOT apply — pytest runs exactly what you asked for.
#
# Gotcha: passing only flags (e.g. ``tox -e unit_tests -- -v``) also drops the default
# selection. pytest falls back to ``testpaths = ["unittests"]`` from pyproject.toml,
# so it runs the FULL unittests/ tree without the -k filter — including integration
# and exploration tests. To get verbose output for the default selection, repeat the
# default explicitly: ``tox -e unit_tests -- unittests/ -v -k "not integration and not exploration"``.
deps =
    -r requirements.txt
    .[tests]
setenv = PYTHONPATH = {toxinidir}/src
commands = python -m pytest --basetemp={envtmpdir} {posargs:unittests/ -k "not integration and not exploration"}

[testenv:integration_tests]
# Runs only SAP integration tests. Requires SAP access and credentials.
#
# Usage:
#   tox -e integration_tests                                                 # All integration tests
#   tox -e integration_tests -- unittests/desktop/test_X.py -v               # One file
#   tox -e integration_tests -- unittests/desktop/test_X.py::test_foo        # One test
#   SAP_LANGUAGE=EN tox -e integration_tests                                 # Override language
#
# When posargs are passed they REPLACE the default selection entirely (the
# ``-k integration`` filter does NOT apply on top of a targeted run), so a
# targeted file or nodeid runs exactly as pytest would interpret it. This
# is the fix for #639 where ``-- <file>`` previously appended after the
# default ``unittests/ -k integration``, leading to the entire integration
# suite running plus the targeted file.
#
# Gotcha: passing only flags (e.g. ``tox -e integration_tests -- -v``) also
# drops the default. pytest falls back to ``testpaths = ["unittests"]`` from
# pyproject.toml and the -k filter is NOT applied, so it runs the entire
# unittests/ tree (unit tests included). To get verbose output for the
# default selection, repeat the default explicitly:
#   tox -e integration_tests -- unittests/ -k integration -v
#
deps =
    -r requirements.txt
    .[tests]
setenv = PYTHONPATH = {toxinidir}/src
passenv =
    SAP_URL
    SAP_USER
    SAP_PASSWORD
    SAP_MANDANT
    SAP_LANGUAGE
commands = python -m pytest --basetemp={envtmpdir} {posargs:unittests/ -k integration}

[testenv:linting]
# the linting environment is called by the Github Action that runs the linter
deps =
    {[testenv:tests]deps}
    .[linting]
setenv = PYTHONPATH = {toxinidir}/src
commands =
    pylint sapwebguimcp

[testenv:type_check]
# the type_check environment checks the type hints using mypy
setenv = PYTHONPATH = {toxinidir}/src
deps =
    {[testenv:tests]deps}
    .[type_check]
commands =
    mypy --show-error-codes src/sapwebguimcp --strict

[testenv:spell_check]
# the spellcheck environment checks the code for typos
setenv = PYTHONPATH = {toxinidir}/src
deps =
    -r requirements.txt
    .[spell_check]
commands =
    codespell --ignore-words=domain-specific-terms.txt src
    codespell --ignore-words=domain-specific-terms.txt README.md

[testenv:coverage]
# the thing with the coverage is, that most of the testworthy code requires a real SAP backend
# which we don't have in CI. so this part of the coverage only makes sense when testing against
# a real backend locally.
deps =
    -r requirements.txt
    .[tests]
    .[coverage]
setenv = PYTHONPATH = {toxinidir}/src
passenv =
    SAP_URL
    SAP_USER
    SAP_PASSWORD
    SAP_MANDANT
    SAP_LANGUAGE
commands =
    coverage run -m pytest --basetemp={envtmpdir} {posargs}
    coverage html --omit .tox/*,unittests/*
    coverage report --fail-under 20 --omit .tox/*,unittests/*

[testenv:formatting]
# the formatting environment checks code style
setenv = PYTHONPATH = {toxinidir}/src
deps =
    -r requirements.txt
    .[formatting]
commands =
    black --check src/sapwebguimcp unittests
    isort --check src/sapwebguimcp unittests

[testenv:dev]
# the dev environment contains everything you need to start developing on your local machine.
deps =
    {[testenv:tests]deps}
    {[testenv:linting]deps}
    {[testenv:type_check]deps}
    {[testenv:coverage]deps}
    {[testenv:spell_check]deps}
    .[formatting]
    .[dev]
commands =
    python -m pip install --upgrade pip
    pip install -r requirements.txt

[testenv:test_packaging]
skip_install = true
deps =
    .[packaging]
commands =
    python -m build
    twine check dist/*

[testenv:compile_requirements]
deps =
    pip-tools
commands =
    pip-compile pyproject.toml --output-file requirements.txt

[testenv:build_executable]
# Builds a standalone Windows exe via PyInstaller.
# The --copy-metadata/--collect-* flags fix bundling issues with transitive dependencies:
#   - fastmcp uses importlib.metadata.version("fastmcp") at import time
#   - fastmcp -> docket -> fakeredis needs commands.json data files
#   - fastmcp -> docket -> fakeredis -> lupa needs Lua runtime submodules
#   - sapwebguimcp ships js/, prompts/, data/, workflows/ non-Python files
# If fastmcp drops the docket dependency, the lupa/fakeredis flags can be removed.
deps =
    -r requirements.txt
    .[build_executable]
commands =
    pyinstaller --onefile --name sapwebgui_mcp_windows \
        --copy-metadata fastmcp \
        --collect-submodules lupa \
        --collect-data fakeredis \
        --collect-data sapwebguimcp \
        src/sapwebguimcp/server.py
