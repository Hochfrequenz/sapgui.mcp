[tox]
envlist =
    tests
    linting
    type_check
    spell_check
    formatting
skip_missing_interpreters = True
skipsdist = True

[testenv]
commands = python -m pip install --upgrade pip

[testenv:tests]
# Runs ALL tests. SAP integration tests are auto-skipped on non-SAP machines via pytest.skip().
# This allows CI to run all tests while only executing integration tests on authorized machines.
deps =
    -r requirements.txt
    .[tests]
setenv = PYTHONPATH = {toxinidir}/src
passenv =
    SAP_URL
    SAP_USER
    SAP_PASSWORD
    SAP_MANDANT
    SAP_LANGUAGE
commands = python -m pytest --basetemp={envtmpdir} {posargs}

[testenv:unit_tests]
# Runs only offline unit tests (selector tests with HTML snapshots).
# Useful for quick local iteration without SAP access.
deps =
    -r requirements.txt
    .[tests]
setenv = PYTHONPATH = {toxinidir}/src
commands = python -m pytest unittests/test_selectors.py unittests/test_se93_parser.py unittests/test_se37_parser.py --basetemp={envtmpdir} {posargs}

[testenv:integration_tests]
# Runs only SAP integration tests. Requires SAP access and credentials.
#
# Usage:
#   tox -e integration_tests                     # Uses .env file settings
#   SAP_LANGUAGE=EN tox -e integration_tests     # Override language to English
#
deps =
    -r requirements.txt
    .[tests]
setenv = PYTHONPATH = {toxinidir}/src
passenv =
    SAP_URL
    SAP_USER
    SAP_PASSWORD
    SAP_MANDANT
    SAP_LANGUAGE
commands = python -m pytest unittests/test_sap_integration.py --basetemp={envtmpdir} {posargs}

[testenv:linting]
# the linting environment is called by the Github Action that runs the linter
deps =
    {[testenv:tests]deps}
    .[linting]
setenv = PYTHONPATH = {toxinidir}/src
commands =
    pylint sapwebguimcp

[testenv:type_check]
# the type_check environment checks the type hints using mypy
setenv = PYTHONPATH = {toxinidir}/src
deps =
    {[testenv:tests]deps}
    .[type_check]
commands =
    mypy --show-error-codes src/sapwebguimcp --strict

[testenv:spell_check]
# the spellcheck environment checks the code for typos
setenv = PYTHONPATH = {toxinidir}/src
deps =
    -r requirements.txt
    .[spell_check]
commands =
    codespell --ignore-words=domain-specific-terms.txt src
    codespell --ignore-words=domain-specific-terms.txt README.md

[testenv:coverage]
# the thing with the coverage is, that most of the testworthy code requires a real SAP backend
# which we don't have in CI. so this part of the coverage only makes sense when testing against
# a real backend locally.
deps =
    -r requirements.txt
    .[tests]
    .[coverage]
setenv = PYTHONPATH = {toxinidir}/src
passenv =
    SAP_URL
    SAP_USER
    SAP_PASSWORD
    SAP_MANDANT
    SAP_LANGUAGE
commands =
    coverage run -m pytest --basetemp={envtmpdir} {posargs}
    coverage html --omit .tox/*,unittests/*
    coverage report --fail-under 20 --omit .tox/*,unittests/*

[testenv:formatting]
# the formatting environment checks code style
setenv = PYTHONPATH = {toxinidir}/src
deps =
    -r requirements.txt
    .[formatting]
commands =
    black --check src/sapwebguimcp unittests
    isort --check src/sapwebguimcp unittests

[testenv:dev]
# the dev environment contains everything you need to start developing on your local machine.
deps =
    {[testenv:tests]deps}
    {[testenv:linting]deps}
    {[testenv:type_check]deps}
    {[testenv:coverage]deps}
    {[testenv:spell_check]deps}
    .[formatting]
    .[dev]
commands =
    python -m pip install --upgrade pip
    pip install -r requirements.txt

[testenv:test_packaging]
skip_install = true
deps =
    .[packaging]
commands =
    python -m build
    twine check dist/*

[testenv:compile_requirements]
deps =
    pip-tools
commands =
    pip-compile pyproject.toml --output-file requirements.txt
